
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white">
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-4">Subscription Tracker</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <h2 class="text-2xl font-bold mb-4">Add Subscription</h2>
                <form id="subscription-form" class="space-y-4">
                    <div>
                        <label for="name" class="block mb-2">Subscription Name</label>
                        <input type="text" id="name" class="w-full bg-gray-800 rounded p-2" required>
                    </div>
                    <div>
                        <label for="price" class="block mb-2">Monthly Price</label>
                        <input type="number" id="price" class="w-full bg-gray-800 rounded p-2" required>
                    </div>
                    <div>
                        <label for="category" class="block mb-2">Category</label>
                        <input type="text" id="category" class="w-full bg-gray-800 rounded p-2" required>
                    </div>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 rounded p-2 w-full">Add Subscription</button>
                </form>
            </div>

            <div>
                <h2 class="text-2xl font-bold mb-4">Subscriptions</h2>
                <div id="subscription-list" class="space-y-4"></div>
                <div class="mt-4">
                    <h3 class="text-xl font-bold">Total Monthly Spend: $<span id="total-spend">0.00</span></h3>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js" type="module"></script>
    <script src="firebase-config.js" type="module"></script>
    <script src="main.js" type="module"></script>
</body>
</html>
